<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error-container": "#ffdad6",
                    "secondary-fixed": "#e2e2e2",
                    "secondary": "#c6c6c7",
                    "on-surface-variant": "#c3c6d7",
                    "surface-container-high": "#1c2b3c",
                    "surface-dim": "#051424",
                    "surface": "#051424",
                    "on-tertiary-fixed": "#360f00",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-secondary-container": "#b4b5b5",
                    "on-primary-container": "#eeefff",
                    "error-container": "#93000a",
                    "surface-container-highest": "#273647",
                    "outline": "#8d90a0",
                    "on-surface": "#d4e4fa",
                    "tertiary-fixed": "#ffdbcd",
                    "on-tertiary-container": "#ffede6",
                    "inverse-primary": "#0053db",
                    "on-background": "#d4e4fa",
                    "primary-fixed": "#dbe1ff",
                    "inverse-on-surface": "#233143",
                    "surface-tint": "#b4c5ff",
                    "on-primary": "#002a78",
                    "surface-bright": "#2c3a4c",
                    "tertiary": "#ffb596",
                    "on-secondary": "#2f3131",
                    "tertiary-container": "#bc4800",
                    "on-secondary-fixed": "#1a1c1c",
                    "on-secondary-fixed-variant": "#454747",
                    "secondary-fixed-dim": "#c6c6c7",
                    "error": "#ffb4ab",
                    "on-error": "#690005",
                    "surface-variant": "#273647",
                    "surface-container": "#122131",
                    "primary-container": "#2563eb",
                    "tertiary-fixed-dim": "#ffb596",
                    "outline-variant": "#434655",
                    "on-tertiary": "#581e00",
                    "inverse-surface": "#d4e4fa",
                    "surface-container-lowest": "#010f1f",
                    "background": "#051424",
                    "surface-container-low": "#0d1c2d",
                    "secondary-container": "#454747",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-primary-fixed": "#00174b",
                    "primary": "#b4c5ff",
                    "cream-surface": "#FDFCF7"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin": "20px",
                    "sm": "8px",
                    "xs": "4px",
                    "lg": "24px",
                    "base": "4px",
                    "xl": "32px",
                    "gutter": "16px",
                    "md": "16px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "h1": ["Inter"],
                    "h3": ["Inter"],
                    "h2": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "h3": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .pass-texture {
            background-image: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary-container selection:text-on-primary-container">
<main class="flex flex-col items-center justify-start min-h-screen px-margin pt-xl pb-32">
<!-- Success Header -->
<div class="flex flex-col items-center text-center mb-xl">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-md shadow-[0_0_40px_rgba(37,99,235,0.4)]">
<span class="material-symbols-outlined text-[48px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface">Booking Confirmed!</h1>
<p class="font-body-md text-on-surface-variant mt-xs">Your workspace is ready for you.</p>
</div>
<!-- Central E-Pass (Digital Ticket) -->
<div class="w-full max-w-sm relative">
<!-- Ticket Top -->
<div class="bg-cream-surface rounded-t-xl p-lg flex flex-col items-center relative shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
<div class="w-full flex justify-between items-center mb-lg">
<span class="font-h3 text-h3 text-surface-dim">London</span>
<span class="font-label-caps text-label-caps bg-surface-container-highest text-on-surface px-sm py-xs rounded">#DH-8829</span>
</div>
<!-- QR Code Container -->
<div class="bg-white border-2 border-outline-variant/10 p-md rounded-lg mb-lg shadow-sm">
<img alt="Entry QR Code" class="w-48 h-48" data-alt="A high-contrast, professional QR code centered on a clean white background. The graphic is sharp and modern, designed for digital scanning on a premium workspace access pass. The lighting is perfectly even, maintaining a corporate and secure aesthetic consistent with a high-end coworking environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCIoDSrHIqMuL3Fa22p1qKWTjG5lcUAGoatzYaCi9PoX0SELe4C7yuQc99iWrFmBu9BpX0EUo4d9TVMAZjK5Y25HWoG_YO06LKc-TezyMBX1bSIwtzQibAluqEeEz0CYhVO4g6PhoASakw1KzuF89aX-lUC4TRyC4YLJnrnPGWTvK-Uc8atH-T5QJkHmm9_sdOCxMmrCCluis2ri_XH4hqyzD5PrG1rFbegzy86ZrduyMOsXM9cDJwRttA_T1xh7U65k8w--QYgn4-1"/>
</div>
<p class="font-label-caps text-label-caps text-outline mb-base uppercase tracking-widest">Scan for Entry</p>
<!-- Ticket Serrated Edge Simulation -->
<div class="absolute -bottom-3 left-0 right-0 flex justify-between px-xs z-10 overflow-hidden">
<div class="w-6 h-6 bg-background rounded-full -ml-3"></div>
<div class="w-full border-b-2 border-dashed border-outline-variant/30 mt-3 h-0"></div>
<div class="w-6 h-6 bg-background rounded-full -mr-3"></div>
</div>
</div>
<!-- Ticket Bottom -->
<div class="bg-cream-surface pass-texture rounded-b-xl p-lg pt-8 shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
<div class="grid grid-cols-2 gap-y-lg">
<div>
<p class="font-label-caps text-label-caps text-outline mb-xs">WORKSPACE</p>
<p class="font-h3 text-h3 text-surface-dim">The Glass House</p>
</div>
<div class="text-right">
<p class="font-label-caps text-label-caps text-outline mb-xs">SEAT</p>
<p class="font-h3 text-h3 text-surface-dim">Desk A12</p>
</div>
<div>
<p class="font-label-caps text-label-caps text-outline mb-xs">DATE</p>
<p class="font-body-lg text-body-lg text-surface-dim">Oct 24, 2023</p>
</div>
<div class="text-right">
<p class="font-label-caps text-label-caps text-outline mb-xs">TIME</p>
<p class="font-body-lg text-body-lg text-surface-dim">09:00 AM</p>
</div>
</div>
</div>
</div>
<!-- Action Buttons Cluster -->
<div class="w-full max-w-sm mt-xl flex flex-col gap-md">
<button class="h-12 w-full flex items-center justify-center gap-sm border-2 border-primary text-primary rounded-lg font-h3 hover:bg-primary/10 transition-colors active:scale-[0.98] duration-150">
<span class="material-symbols-outlined">calendar_add_on</span>
<span>Add to Calendar</span>
</button>
<button class="h-12 w-full flex items-center justify-center gap-sm bg-surface-container-highest border-2 border-transparent text-on-surface rounded-lg font-h3 hover:bg-surface-variant transition-colors active:scale-[0.98] duration-150">
<span class="material-symbols-outlined">ios_share</span>
<span>Share Pass</span>
</button>
</div>
<!-- Navigation Footer Link -->
<div class="mt-xl">
<a class="font-h3 text-primary hover:text-primary-fixed transition-colors" href="#">View All Bookings</a>
</div>
</main>
</body></html>
