<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Desk Booking - The Glass House</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for a premium look -->
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              brown: '#7B5333',
              lightBrown: '#9A7B5C',
              bg: '#FAF3E3',
              card: '#F5EDE0',
              selected: '#2D62ED',
              seat: '#C8C1B5'
            }
          },
          fontFamily: {
            serif: ['Instrument Serif', 'serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    body {
      background-color: #FAF3E3;
      font-family: 'Inter', sans-serif;
      color: #7B5333;
    }
    .pill-shadow {
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }
    .selected-glow {
      box-shadow: 0 8px 20px rgba(45, 98, 237, 0.4);
    }
    .bottom-nav-shadow {
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- BEGIN: MainHeader -->
<header class="px-6 pt-12 pb-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<!-- Location Icon -->
<div class="p-2" data-purpose="icon-container">
<svg class="text-brand-brown" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
<circle cx="12" cy="10" r="3"></circle>
</svg>
</div>
<div>
<h1 class="text-2xl font-serif font-semibold leading-tight">
          The Glass House <span class="mx-1">•</span> Floor 2
        </h1>
</div>
</div>
<!-- Notification Icon -->
<div class="bg-brand-card p-3 rounded-full pill-shadow" data-purpose="notification-bell">
<svg class="text-brand-brown" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
<path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
</svg>
</div>
</header>
<!-- END: MainHeader -->
<main class="flex-grow px-6 pb-32">
<!-- BEGIN: Workspace Image -->
<div class="rounded-3xl overflow-hidden mb-8 shadow-lg">
<img alt="Premium Desk Workspace" class="w-full h-64 object-cover" data-purpose="hero-image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBv66tF14vOwnbwwnQutihKrgSg3QNrNn8TV1ATirfOWRFvhoim2ukNqfY6T8pJygbC1DKIJ2ZiUCvU5_X56_8e5bU-Rr_qmII-onsY0YtF7XzDaEdND-4dAkrhKqliTO_WVhEdG6OC9ea9vz8J6anQKneD_gvRTw8FmRM19xKc04jH3-HTmNfZa-8EYw3BxPBkDc_Tnl_PALnqRinICeqjQWo6jMWbyZl08Fw9LHqUyDIQS6V92tVkFFYYYZWEXM7T60FgkCr2oGg9"/>
</div>
<!-- END: Workspace Image -->
<!-- BEGIN: Seat Selection Section -->
<section class="text-center mb-8"><p class="text-2xl font-serif text-brand-brown py-10">8 seats available — you can book now</p></section>
<!-- END: Seat Selection Section -->
<!-- BEGIN: Info Cards -->
<div class="grid grid-cols-2 gap-4">
<!-- Workspace Type Card -->
<div class="bg-brand-card p-5 rounded-2xl border border-white/40 shadow-sm" data-purpose="info-card">
<span class="text-[10px] font-bold uppercase tracking-widest text-brand-lightBrown block mb-1">Workspace Type</span>
<span class="text-lg font-semibold text-brand-brown">Premium Desk</span>
</div>
<!-- Amenities Card -->
<div class="bg-brand-card p-5 rounded-2xl border border-white/40 shadow-sm" data-purpose="info-card">
<span class="text-[10px] font-bold uppercase tracking-widest text-brand-lightBrown block mb-2">Amenities</span>
<div class="flex gap-3 text-brand-brown">
<!-- Wi-Fi Icon -->
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" x2="12.01" y1="20" y2="20"></line></svg>
<!-- Power Icon -->
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M18 7V5a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v2"></path><path d="M6 11V7h12v4a8 8 0 0 1-8 8 8 8 0 0 1-4-8Z"></path><line x1="10" x2="14" y1="13" y2="13"></line><line x1="12" x2="12" y1="19" y2="22"></line></svg>
<!-- Coffee Icon -->
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M17 8h1a4 4 0 1 1 0 8h-1"></path><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path><line x1="6" x2="6" y1="2" y2="4"></line><line x1="10" x2="10" y1="2" y2="4"></line><line x1="14" x2="14" y1="2" y2="4"></line></svg>
</div>
</div>
</div>
<!-- END: Info Cards -->
</main>
<!-- BEGIN: Bottom Booking Bar -->
<footer class="fixed bottom-0 left-0 right-0 bg-white px-6 py-6 bottom-nav-shadow flex items-center justify-between z-50">
<div class="flex flex-col">
<div class="text-xl font-bold">
<span class="text-brand-brown">Desk 12</span>
<span class="text-brand-lightBrown/50 font-normal ml-1">• Sep 24</span>
</div>
<div class="flex items-center gap-3 mt-1">
<span class="bg-[#E9DFD2] text-brand-brown text-[10px] font-bold px-3 py-1 rounded-md uppercase tracking-wide">Full Day</span>
<span class="text-2xl font-bold text-brand-brown">£240</span>
</div>
</div>
<!-- Proceed Button -->
<button class="bg-brand-selected text-white px-8 py-4 rounded-2xl flex items-center gap-3 font-semibold text-lg shadow-lg relative overflow-hidden group">
      Proceed
      <svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><line x1="5" x2="19" y1="12" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
<!-- Sparkle/Glow decoration as seen in the corner of the image -->
<div class="absolute bottom-0 right-0 opacity-40">
<svg fill="white" height="24" viewbox="0 0 24 24" width="24"><path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z"></path></svg>
</div>
</button>
</footer>
<!-- END: Bottom Booking Bar -->
</body></html>
