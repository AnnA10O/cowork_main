<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoWorkHQ Manager Scanner</title>
  <link rel="stylesheet" href="style.css">
  <!-- html5-qrcode library for camera scanning -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

  <!-- Login Section -->
  <div id="login-section" class="section active">
    <div class="card login-card">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building-2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
        <span>CoWorkHQ Scanner</span>
      </div>
      <h2>Manager Login</h2>
      <p class="subtitle">Log in to verify bookings</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="email">Manager Email</label>
          <input type="email" id="email" required placeholder="manager@example.com">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn primary full-width">Sign In</button>
      </form>
      <div id="login-error" class="error-msg"></div>
    </div>
  </div>

  <!-- Scanner Section -->
  <div id="scanner-section" class="section">
    <header>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building-2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
        <span>Scanner</span>
      </div>
      <div class="header-right">
        <div class="user-info" id="user-info-display">Manager</div>
        <button id="logout-btn" class="btn text">Logout</button>
      </div>
    </header>

    <main class="scanner-container">
      <div class="scanner-card">
        <h2>Scan Customer QR</h2>
        <p class="subtitle">Use camera or hardware scanner</p>

        <!-- Hidden input to capture hardware barcode scanner keystrokes -->
        <input type="text" id="hardware-scanner-input" class="hidden-scanner-input" autofocus autocomplete="off" />

        <div class="tabs">
          <button class="tab-btn active" data-tab="camera">Webcam</button>
          <button class="tab-btn" data-tab="hardware">Hardware Gun</button>
        </div>

        <div class="tab-content active" id="tab-camera">
          <div id="reader-container">
            <div id="reader"></div>
          </div>
          <p class="helper-text">Point camera at the customer's booking QR code</p>
        </div>

        <div class="tab-content" id="tab-hardware">
          <div class="hardware-waiting">
            <div class="pulsing-circle"></div>
            <p>Ready to scan. Press the trigger on your hardware scanner.</p>
            <p class="small-text">(Ensure this window is focused)</p>
          </div>
        </div>

      </div>

      <!-- Result Overlay (Hands-free auto dismiss) -->
      <div id="result-overlay" class="result-overlay">
        <div class="result-card" id="result-card">
          <div class="result-icon" id="result-icon"></div>
          <h2 id="result-title">Success</h2>
          <p id="result-message">Check-in confirmed</p>
          <div class="result-details" id="result-details"></div>
          <div class="progress-bar-container">
            <div class="progress-bar" id="result-progress"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <audio id="sound-success" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
  <audio id="sound-error" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>

  <script src="app.js"></script>
</body>
</html>
